<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文TTS服务 - 音色管理</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>中文TTS服务</h1>
            <p class="subtitle">基于VoxCPM2的多语言语音合成系统</p>
        </header>

        <main>
            <section class="panel" id="voices-panel">
                <div class="panel-header">
                    <h2>音色管理</h2>
                    <button class="btn btn-primary" onclick="showAddVoiceModal()">添加音色</button>
                </div>
                <div id="voices-list" class="voices-grid">
                    <div class="loading">加载中...</div>
                </div>
            </section>

            <section class="panel" id="synthesize-panel">
                <h2>声音合成</h2>
                <form id="synthesize-form">
                    <div class="form-group">
                        <label for="text">待合成文本</label>
                        <textarea id="text" name="text" placeholder="输入要合成的声音文本..." rows="4" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="voice-select">选择音色</label>
                        <select id="voice-select" name="voice_id">
                            <option value="">使用默认音色</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="control">控制符 (可选)</label>
                            <input type="text" id="control" name="control" placeholder="如: 高兴, 悲伤">
                        </div>
                        <div class="form-group">
                            <label for="cfg_value">CFG值</label>
                            <input type="number" id="cfg_value" name="cfg_value" value="1.0" min="0.1" max="2.0" step="0.1">
                        </div>
                        <div class="form-group">
                            <label for="inference_timesteps">推理步数</label>
                            <input type="number" id="inference_timesteps" name="inference_timesteps" value="20" min="1" max="100">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success btn-large" id="synthesize-btn">
                        <span class="btn-text">合成声音</span>
                        <span class="btn-loading" style="display:none;">合成中...</span>
                    </button>
                </form>

                <div id="result-section" class="result-section" style="display:none;">
                    <h3>合成结果</h3>
                    <audio id="audio-player" controls></audio>
                    <div class="result-actions">
                        <button class="btn btn-secondary" onclick="downloadAudio()">下载音频</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-overlay" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3>添加新音色</h3>
                <button class="modal-close" onclick="hideModal()">&times;</button>
            </div>
            <form id="add-voice-form">
                <div class="form-group">
                    <label for="voice-name">音色名称</label>
                    <input type="text" id="voice-name" name="name" placeholder="给音色起个名字" required>
                </div>
                <div class="form-group">
                    <label for="voice-text">参考文本</label>
                    <textarea id="voice-text" name="text" placeholder="音频中说的内容..." rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label for="voice-file">上传音频</label>
                    <input type="file" id="voice-file" name="file" accept="audio/*" required>
                    <small>支持WAV、MP3等音频格式，建议使用清晰的人声录音</small>
                </div>
                <div id="audio-preview" style="display:none;">
                    <label>音频预览</label>
                    <audio id="uploaded-audio-preview" controls></audio>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="hideModal()">取消</button>
                    <button type="submit" class="btn btn-primary">添加音色</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
